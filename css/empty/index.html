<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>My todo list</h1>
        <ul class="todo-list">
            <li class="todo">
                <input type="checkbox" id="todo-1">
                <label for="todo-1">Update GitHub repo</label>
                <ul class="sub-item">
                    <li><a href="https://github.com/CreaDiscord/Crea-HTML-Skillset" target="_blank" class="sub-item-link">Crea-HTML-Skillset</a></li>
                </ul>
            </li>
            <li class="todo">
                <input type="checkbox" id="todo-2">
                <label for="todo-2">Browse the web</label>
                <ul class="sub-item">
                    <li><a href="https://www.google.com/" target="_blank" class="sub-item-link">Google</a></li>
                </ul>
            </li>
            <li class="todo">
                <input type="checkbox" id="todo-3">
                <label for="todo-3">Watch anime</label>
                <ul class="sub-item">
                    <li><a href="https://www.crunchyroll.com/" target="_blank" class="sub-item-link">Crunchyroll</a></li>
                </ul>
            </li>
            <li class="todo">
                <input type="checkbox" id="todo-4">
                <label for="todo-4">Sleep</label>
                <ul class="sub-item">
                    <li><a href="https://www.dfs.co.uk/" target="_blank" class="sub-item-link">DFS</a></li>
                </ul>
            </li>
        </ul>
    </div>
</body>
</html>
